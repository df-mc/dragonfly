name: Build
on: [pull_request]
jobs:

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:

      - name: Check out code into the Go module directory
        uses: actions/checkout@v6

      - name: Set up Go 1.25.0
        uses: actions/setup-go@v6
        with:
          go-version: 1.25.0
        id: go

      - name: Build
        run: go build -o dragonfly_exe -v .

      - name: Lint
        run: make lint
